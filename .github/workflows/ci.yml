name: CI Build and Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore CashChangerSimulator.slnx

      - name: Build
        run: dotnet build CashChangerSimulator.slnx --configuration Release --no-restore

      - name: Test Core and Device Modules
        run: dotnet test test/CashChangerSimulator.Tests/CashChangerSimulator.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test_results_core.trx"

      - name: Test UI Modules (FlaUI requires Desktop session)
        # WPF UI Tests might fail on standard GitHub Actions runners because they run headlessly as a service without an interactive desktop.
        # Therefore, we set continue-on-error to true so it doesn't fail the entire pipeline if the environment lacks a UI session.
        run: dotnet test test/CashChangerSimulator.UI.Tests/CashChangerSimulator.UI.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test_results_ui.trx"
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
