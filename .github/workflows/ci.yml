name: CI Build and Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test-core:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore CashChangerSimulator.slnx

      - name: Build
        run: dotnet build CashChangerSimulator.slnx --configuration Release --no-restore

      - name: Test Core and Device Modules
        run: dotnet test test/CashChangerSimulator.Tests/CashChangerSimulator.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test_results_core.trx"

      - name: Upload Core Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: "**/TestResults/test_results_core.trx"

  test-ui:
    needs: build-and-test-core
    runs-on: [self-hosted, windows, ui-test]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # Self-hosted環境（自身のPC）ではすでに.NETがインストールされていることを前提とし、
      # 権限エラーを避けるため setup-dotnet ステップを省略します。

      - name: Check .NET Version
        run: dotnet --version

      - name: Test UI Modules (Requires Desktop session)
        # self-hosted環境で実行されるため、UIAutomation(FlaUI)が正常に動作します。
        # 競合を防ぐため .runsettings を明示的に指定します。
        run: dotnet test test/CashChangerSimulator.UI.Tests/CashChangerSimulator.UI.Tests.csproj --configuration Release --settings local.runsettings --verbosity normal --logger "trx;LogFileName=test_results_ui.trx"

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: "**/TestResults/test_results_ui.trx"